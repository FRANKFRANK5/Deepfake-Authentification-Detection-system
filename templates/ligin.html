{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DETECTIFY</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #0b0e1a, #141b2b, #1a2332);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .auth-container {
            max-width: 420px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: rgba(20, 27, 43, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(0, 170, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .auth-container h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 1.8rem;
            font-weight: 700;
            font-size: 2rem;
        }
        .auth-container input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,170,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }
        .auth-container input:focus {
            outline: none;
            border-color: #00aaff;
            box-shadow: 0 0 0 3px rgba(0,170,255,0.15);
            background: rgba(255,255,255,0.08);
        }
        .auth-container input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .auth-container .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #0066ff, #00aaff);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0,100,255,0.3);
        }
        .auth-container .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,100,255,0.5);
        }
        .auth-container .auth-links {
            text-align: center;
            margin-top: 1.2rem;
            color: rgba(255,255,255,0.6);
        }
        .auth-container .auth-links a {
            color: #00aaff;
            font-weight: 500;
            transition: 0.3s;
        }
        .auth-container .auth-links a:hover {
            color: #4d9eff;
            text-decoration: none;
        }
        .messages {
            margin-top: 1rem;
        }
        .messages .alert {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-weight: 500;
        }
        .alert-danger {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.2);
            color: #f8d7da;
        }
        .alert-success {
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.2);
            color: #d4edda;
        }
        .navbar-custom {
            background-color: #0b0e1a !important;
            border-bottom: 1px solid rgba(0,170,255,0.1);
        }
        .navbar-custom .nav-link {
            color: #00aaff !important;
            font-weight: 600;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .navbar-custom .nav-link:hover {
            color: #4d9eff !important;
            text-shadow: 0 0 10px rgba(0,170,255,0.3);
        }
        .navbar-brand {
            font-size: 1.8rem !important;
            font-weight: 800 !important;
            background: linear-gradient(90deg, #00aaff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <!-- Navbar (kama ulivyotaka, lakini rangi za bluu) -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-2">
        <a class="navbar-brand" href="{% url 'ml_app:home' %}">DETECTIFY</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ml_app:home' %}">Home</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'register' %}">Register</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2>🔐 Login</h2>
            
            <!-- Onyesha messages (makosa au mafanikio) -->
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required autofocus>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="{% url 'register' %}">Register</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
