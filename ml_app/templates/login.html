{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width:400px; margin:3rem auto; padding:2rem; background:rgba(20,27,43,0.6); backdrop-filter:blur(10px); border-radius:16px; border:1px solid rgba(0,170,255,0.1); box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <h2 style="text-align:center; color:#ffffff; margin-bottom:1.5rem;">🔐 Login</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" style="padding:0.5rem; border-radius:8px; margin-bottom:1rem; background:rgba(255,0,0,0.1); color:#ff6b6b;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required style="width:100%; padding:0.7rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,170,255,0.15); border-radius:8px; color:#ffffff;">
        <input type="password" name="password" placeholder="Password" required style="width:100%; padding:0.7rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,170,255,0.15); border-radius:8px; color:#ffffff;">
        <button type="submit" class="buttonFilled" style="width:100%; padding:0.7rem; background:linear-gradient(135deg, #0066ff, #00aaff); border:none; border-radius:40px; color:#fff; font-weight:600; cursor:pointer;">Login</button>
    </form>
    <p style="text-align:center; margin-top:1rem; color:rgba(255,255,255,0.6);">Don't have an account? <a href="{% url 'ml_app:register' %}" style="color:#00aaff;">Register</a></p>
</div>
{% endblock %}
